author: "WeNeedMorePhoron"
delete-after: True
changes:
  - bugfix: "Refresh action buttons after outfit is equipped so you don't get bamboozled by your spells being unavailable and manually click it to reflect properly."
  - bugfix: "remove unavailable Gravel Blast option from poke spells. Thanks to Abyssal for report."
  - rscadd: "Add ability to reselect choice spell in your aspect for 2 points. Due to concurrent and conflicting TM with TGUI, this is not reflected in the UI yet! Apologize for the inconvenience. (Keeping this as note in case this get merged before TGUI rework)"
  - rscadd: "Reworked Conjuration to remove the projectile spell, in favor of an active summon manipulation styles based on you participating in combat in melee yourself while fighting alongside or behind your summons."
  - rscadd: "Book can now be stored on the hip."
  - rscadd: "Telomancy has been reworked into a school with a heavy focus on its first ability as projectile spam for most of its budget with the rest being situational."
  - rscadd: "Conjuration leash has been fixed and we shouldn't have people remote pilot their summons over multiple screens"
  - rscadd: "Lowered passive healing, increased raw bleed and pain rate on burns so that burn's lethality isn't heavily tilted toward the chest / head and not anywhere else"
  - rscadd: "Added additional choices for champions / attackers and adjusted the statline of attacker to focus on perception and such. Attacker now have dual wield, no dexpert, and decnt armor and is focused on the offensive"
  - rscadd: "Improved ranged AI and general AI to be far more reliable, both with and without conjuration."
  - rscadd: "IMPORTANT: Fixed an issue where weakpoint and zone aiming logic on NPC was not working for over 4 months, which means they are actually baitable, predictable, and also far more dangerous to unarmored spot. This applies"
  - rscadd: "Removed some new exploits added with new spells of guarding against your own spells due to a misplaced check"
  - rscadd: "Shields Implement choice has been removed. Arcyne Aegis is now unified as heater shield tier stat and now a Minor Aspects due to its power."
  - rscadd: "Added a proper, visible tether to Spirit Projection"
  - rscadd: "Fixed the AI inventory manager, probably."
  - rscadd: "Fire damage no longer inherits and use Blunt's multiple layer damage, which was inflating damage vs armor by 50 - 100% vs 2 / 3 layers armor due to blunt's multiple layers passthrough mechanics"
  - rscadd: "Deflecting a spell now exposes the caster for better and more interactive counterplay in PVP"
  - rscadd: "Minion recall is now smarter on logic and won't teleport them into empty space again."
  - rscadd: "Minion Summon now have a range of 2 to avoid excessively cheesy remote summon"
  - rscadd: "Surge / being stood up by surge blocks you from laying down for 1 second, to close off one easy way to mess up people mashing V to stand up to fall down again"
  - rscadd: "Old Magick Witch should get choice of staff"
  - rscadd: "Hellhound no longer use firestacks but the new scorched mechanics"
  - rscadd: "Grimoire improvements. Added the ability to switch Choice Spell in place for 2 reset points. Added new Mastery for Master Conjurer. Note that Lich do not have Arcyne Armament at Master yet due to ongoing TM conflicts and I do not wish to block major PR with a two lines change"
  - rscadd: "Teleport-Taunt's threat has been increased"
  - rscadd: "Pillar of Fire now hits zone properly"
  - rscadd: "Frost Shards (Cryo), Bolt of Lightning (Fulgur), Geas (Geo), Wyrmfire (Pyro), Void Beam (Telo) now is back to SWINGDELAY_CANCEL, so that each school have some big hitter that is punishable by red and isn't a free escape at point blank. This gives a slight penalty to running up to people on Cryo and then shotgunning them as an enemy can potentially cancel it, lightning bolt isn't a free escape, Geas being Geo's strongest CC is harder to pull off, Wyrmfire, being Pyro's big hitter, should have some more risks in close rquarter. And Void Beam is a heavy setup, situational spell that barely hit player but when it does is devastating"
  - rscadd: "Updated pyrobolts and pyro arrows and bottlebomb away from firestacks into the new system. They may be under or overpowered. Please report and use"
  - rscadd: "Made the Circumdatum spell for Telomancy slightl stronger"
  - bugfix: "Fixed Hedge Mage's desciprtion"
  - rscadd: "Made all Archer NPC take a -1 CON and -1 WIL property. They now kite on screen. Also vastly improved their AI so that they are less likely to be stuck"
  - rscadd: "Arcyne Trickster get blink as a treat."
  - rscadd: "Attempted 5 times in a row to fix and make ranged AI more reliable"
  - rscadd: "Conjuration's Untethering range is increased to 10 and given a bit more leeway so that you do not suffer your summons insta disappearing because your NPC walk slightly slower than you. Yes, I feel your pain"
  - rscadd: "Grenzelhoftian Mage now gain access to Conjuration, with a unique Doppel Soldner spell that summons two shit ass peasant with Journeyman and a nice beret and distinctive weakness."
  - rscadd: "Geomancy integrity factor reduced to 1.3 to reduce its oppressiveness vs plate without losing its identity as the blunt school."
  - rscdel: "Removed unused acid damage type"
  - rscadd: "Improved UI to show the new feature to swap choice spell in place for 2 points"