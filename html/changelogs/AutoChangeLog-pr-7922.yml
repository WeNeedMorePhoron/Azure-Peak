author: "Ollanius"
delete-after: True
changes:
  - rscadd: "Blacksteel weapons and tools. All of them."
  - balance: "Blacksteel weapons that require a gemstone to craft - the longsword, flamberge, polehammer, halberd and rapier - now use a lesser version of Free's 'special maneuver' system. The longsword can access eight (flailsweeping and charges added) maneuvers, while the rest (including the flamberge) can access four."
  - rscadd: "Blacksteel chisels and saws."
  - rscadd: "Blacksteel gorgets and bracers for both armor variations."
  - code_imp: "Blacksteel equipment-slash-loot spawners now properly roll for all major blacksteel armor- and weapon-pieces."
  - rscadd: "Triumph-exclusive berets can now be worn on helmet cosmetic slots."
  - rscadd: "Donator- and triumph-exclusive shoulderguards, which can be worn on either helmet- or cloak cosmetic slots."
  - rscadd: "Donator- and triumph-exclusive orles, wearable on the helmet slots and dyeable in two different shades."
  - rscadd: "Donator-exclusive reskins of nearly every generic steel weapon, alongside multiple others."
  - rscadd: "Azure's classic daggers, courtesy of Kavrick, now available once more as a Triumph-exclusive reksin."