author: "radarseas"
delete-after: True
changes:
  - rscadd: "New conjured summon NPCs for necromancers, slightly better skills + guarrenteed gear loadout."
  - rscadd: "Necromancer skeletons can now pick features on summoning as well as their body/name."
  - rscadd: "Necro skele talbards, these are surcoats and jupons without the colors of an Exarch's empire that lich skeles get. Used for seige skeletons, unbound skeletons and necromancer summons + skeletons."
  - rscadd: "Necro skeles can pick their helms + new loadout tuneups."
  - rscadd: "Necro skeles can now fly a cloak/tabard/toga of their choice!"
  - rscadd: "Shattered bulwark, a weaker version of Necromancer's previous heavy armor. Tough but shatters fast when the armor does."
  - balance: "Unbound death knight gets another helmet choice."
  - balance: "Unbound death knight gets three armor pick choices."
  - balance: "Lich skeleton spellblade gets bonemend so they don't die from their own gameplay loop, lol."
  - balance: "Unbound skeles no longer get unintended items and poison daggers to do reagent warfare. Play Malpractioner for that."
  - balance: "Most Necromancer skeles are now Medium trained instead of Heavy to substitute for more numbers."
  - balance: "Necromancer sapper is now a proper lesser sapper, even getting some of the lich ver, attire and speccing out a little more towards construction w/out, the QOL/arcayne/wall exploding lich sappers get."
  - balance: "Unbound death knight gets more gilbranze choices for weaponry + slightly better gear."
  - balance: "Unbound skeletons are capped to 10 CON + whatever INT/WIL they started with for statpacks."
  - balance: "Unbound skeletons get additional context on the whole dusting thing, yeah."
  - balance: "Unbound spellblade rag mask -> decrepid hijab for the true Tarichean wannabie style akin to lich's version."
  - balance: "Necromancers now have message + mindlink for QOL of interacting with their minions, or contacting wretches or assocates of whatever form from afar."
  - balance: "unbound skeletons now get salvaged gear + use combat_weird.ogg"
  - balance: "Formation is now 3 seconds from 6 seconds to cast, given an extra 5 second to cooldown."
  - balance: "Necromancers get Expert from Journeyman in medicine + misc skills rogue mages previously got."
  - balance: "Conjure Guard is now 6 seconds from 3 seconds, with a 1 minute delay."
  - balance: "Conjured Guards now last 45 from 30 minutes, to make up for a slightly slower summoning time + cooldown."
  - balance: "Necromancers have lost 1 speed point of their stats, a slight reduction in excess combat skills and slightly worse alchemy."
  - balance: "Necromancers get a choice between plain robes and protective, new robes exclusive to them to stand out and aura-farm."
  - balance: "Necromancer Player skeles 2 -> 6 total"
  - balance: "Necromancer Maximal lux charges 2 -> 3 total\nbalance Necromancer Starting lux charges -> Unchanged."