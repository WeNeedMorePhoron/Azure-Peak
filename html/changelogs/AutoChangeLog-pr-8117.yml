author: "WeNeedMorePhoron"
delete-after: True
changes:
  - balance: "All statbuff potions, instead of granting the renewed buff for 3 seconds, instead increase the duration of your status effect by 1 minute, up to 27 minutes, which is capped out. My goal is to make duration far more transparent, easier to calculate and balance and also make it more useful for PVE instead of a one off pop before PVP to slime your opponents out"
  - balance: "Statbuff potions still purge eachother"
  - rscadd: "Ingesting stat buff potions now show a pop up alert of your stat buffs"
  - rscadd: "Stamina Potions no longer straight up grant you green stamina and allow you to utterly slime out opponent with certain intents. Instead, it grants you fortitude. This counts as a type of stat buff potion and will purge any other type of stat buff potions! **Fortitude buff can uniquely only stack to 3 minutes.**"
  - rscadd: "Statbuff potions now give outline like the old augmentation spells."
  - rscadd: "Stamina Potions renamed Fortitude Potions internally. No typepath changes"
  - rscadd: "Fortitude Potions now yields **30 units**, lasts up to **10 minutes**. And weak potion give you 10 minutes duration, while strong one gives you 20 minutes  (capped, so you need to resip, it is more efficient volume wise but you will have to space out your sip to not waste it)."
  - rscadd: "All statbuff potion except fortitude and fortune now have a distinct downside. Balance might be adjusted."