author: "WeNeedMorePhoron"
delete-after: True
changes:
  - rscadd: "Telegraphed primordial abilities, removed the flowing river BS in favor of just a massive mobile moat the water primordial can create"
  - rscadd: "Flame now do dragons breath, Air now blows u away and slow you down with telegraph. Parryable"
  - rscadd: "Primordials will balloon alert when Special ready"
  - rscadd: "Refactored fellowship snapping onto base level as a Shift G mode, rejoice, Lamas of the Master"
  - rscadd: "Adjust burn wounds 100000 times to hopefully make it more obvious and less oppressive"
  - rscadd: "Made infernal feather less mega bullshit"
  - rscadd: "Now, traditnioal firestacks will concentrate its burn one limb at a time instead of spreading throughout the whole body and just rapidly nuking you with full body bleed."
  - rscadd: "Improved the hotbar UI such that you can use Ctrl Click to toggle rearrangement mode, preventing you from firing any spell, allowing you to re-arrange them en masse in place. Spells on hotkey are labeled 1 to 9. This disable the abilities to free drag buttons whatever and keep it at the bottom, but should be a general improvement for the vast majority of spell users."
  - rscadd: "Replaced goblins with gnomes for conjured horde so mages are no longer summoning graggarspawns"
  - rscadd: "Bottle bomb now applies a 1 second timer to prevent stacking multiple bombs to instantly kill someone"
  - rscadd: "Removed an inaccurate line about unlocking the SILVERFACE from tips.txt"
  - rscadd: "Removed tabards from summons for better drip"
  - rscadd: "Pyroclasm now have a 2x simple mob modifier. Pillar of Flame now calls fire act on items in the tile it touches."
  - rscadd: "You can no longer far travel on conjured summon (??)"
  - rscadd: "Fixes some bugs related to the action icons"
  - rscadd: "Almah and Black Oak are now medium armor instead of light armor classes, and has their gears upgraded correspondingly to match Janissary / Guardian. Also, Black Oak mercenary class now starts with a padded gambeson instead of a bare shirt."
  - rscadd: "Cut out exploit related to rimworld like organ and lux farm with conjured summons"
  - rscadd: "Optimized action icons rebuild to avoid unnecessary calls"
  - rscadd: "Fixed broken re-arrangement of learn spell and prestidigitation to the end of your spellbar"
  - rscadd: "Removed the self damage mechanics from Spellblade / Spellfist's overcharge, in favor of a straining mechanics that force you to spend or lose every stack with a vulnerability window if you mistime. This is done to make the non self healing spellblade / spellfist much less awkward to use and encourage you to actually build up to your payout."
  - rscadd: "Blade Storm charging time reduced to 1"
  - rscadd: "Refactored advsetup to make action buttons clear properly at the end of setup no matter what path you takes. Report oddities such as being able to move at spawn."