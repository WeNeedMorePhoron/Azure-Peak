author: "WeNeedMorePhoron"
delete-after: True
changes:
  - balance: "Augmentation buffs last a minute, as nintended."
  - balance: "-Soulshot damage reduced to 80, CD raised to 10. Soulshot now gain 0.75x instead of 0.5x damage after piercing the first target, to solidify its identity as a piercing death beam in compensation for losing some single target potential."
  - balance: "Arcyne Strike and Projectile no longer have damage multiplied when interacting with vulnerable / exposed because some scales very very high. Instead, vulnerable will inflict a flat 20 on integrity, and exposed 45. This prevent case like scaled up bow, sling, mage projectiles (boulder strike), soulshot etc. from obliterating armor when used with exposed."
  - rscadd: "Cleaned up Tremor and Shatter's description, gave GWstrap to two handed loadout for spellblade where appropriate"
  - balance: "Augmentation lost its Basic Offensive Magyck Options"
  - balance: "Forcewall is no longer passthrough for its caster. Too cheesy."
  - balance: "Fortitude now applies a 25%, not 50% stamina cost reduction. Lesser Fortitude shot and it no longer twin link echoes."
  - balance: "Precognition cost reduced to 1 pt, it no longer reset feint and bait cooldown, and only defend and special."
  - balance: "Enlarge only applies to ally in your fellowship or yourself, to prevent you from enlarging an enemy to make them easier to click."
  - balance: "Stoneskin, the con check master, has been removed in favor of Blood Rush, which is on a 60 seconds cooldown and apply the effect of Adrenaline Surge to yourself or your ally. This is not echoed\nbalance:Guidance has been removed, replaced with +2 / +3 Perception, across the board, for multiple classes. Same for Reverse Guidance, across multiple classes including bards and hag etc. Replacement is basically 1 to 1"
  - balance: "Precognition is considered a type of Augmentation Buff spells and can access Fellowship Snap Mode for casting."
  - balance: "Snap Mode now also snap to yourself where appropriate."